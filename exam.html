<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Nectous - Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260312h">
    <link rel="stylesheet" href="exam.css">
    <script type="module" src="firebase-init.js?v=20260308b"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="assets/logo.png" alt="Code Nectous logo">
                <div class="logo-text">
                    <span class="logo-title"><span class="logo-elite">Code</span><span class="logo-coders">Nectous</span></span>
                    <span class="logo-tagline">Exam Center</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-links">
                    <a class="progress-link" href="index.html">Home</a>
                    <a class="auth-link" id="accountLink" href="auth.html">Login / Sign Up</a>
                    <button class="auth-logout" id="logoutBtn" type="button" hidden>Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container exam-page">
        <section class="exam-hero">
            <h1>Language Exams</h1>
            <p>Each exam has 20 MCQs. Every correct answer gives 1 point and 10 XP.</p>
        </section>

        <section id="subjectGrid" class="subject-grid"></section>
        <section id="examIntro" class="exam-intro panel"></section>
        <section id="examContainer" class="exam-container panel"></section>
        <section id="examResult" class="exam-result panel"></section>
    </main>

    <script defer src="site.js?v=20260312g"></script>
    <script defer src="exam.js"></script>
</body>
</html>
